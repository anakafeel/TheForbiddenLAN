<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SkyTalk - Tactical Communications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg-primary: #0B0614;
        --color-bg-secondary: #120A1F;
        --color-bg-tertiary: #1A0F2E;
        --color-accent-primary: #A855F7;
        --color-accent-glow: rgba(168, 85, 247, 0.4);
        --color-text-primary: #EAEAF0;
        --color-text-muted: #6B6B80;
        --color-danger: #EF4444;
        --color-success: #22C55E;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: var(--color-bg-primary);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--color-bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-accent-primary);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #C084FC;
      }

      /* Pulse animation for active states */
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      @keyframes glow-pulse {
        0%, 100% { 
          box-shadow: 0 0 20px var(--color-accent-glow);
        }
        50% { 
          box-shadow: 0 0 40px var(--color-accent-glow), 0 0 60px var(--color-accent-glow);
        }
      }

      @keyframes danger-pulse {
        0%, 100% { 
          box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }
        50% { 
          box-shadow: 0 0 40px rgba(239, 68, 68, 0.7), 0 0 60px rgba(239, 68, 68, 0.4);
        }
      }

      @keyframes slide-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes scan-line {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100vh); }
      }

      /* Utility classes for animations */
      .animate-pulse { animation: pulse 2s ease-in-out infinite; }
      .animate-glow { animation: glow-pulse 2s ease-in-out infinite; }
      .animate-danger { animation: danger-pulse 1.5s ease-in-out infinite; }
      .animate-slide-up { animation: slide-up 0.3s ease-out; }
      .animate-fade-in { animation: fade-in 0.2s ease-out; }

      /* Glass effect (for supported browsers) */
      .glass {
        background: rgba(18, 10, 31, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      /* Input styling overrides */
      input, textarea {
        font-family: inherit;
        outline: none;
      }
      input:focus, textarea:focus {
        border-color: var(--color-accent-primary) !important;
        box-shadow: 0 0 0 2px var(--color-accent-glow);
      }

      /* Button base styling */
      button {
        font-family: inherit;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      button:active {
        transform: scale(0.98);
      }

      /* Selection styling */
      ::selection {
        background: var(--color-accent-primary);
        color: var(--color-text-primary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.web.js"></script>
  </body>
</html>
