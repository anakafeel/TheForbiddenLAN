services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skytalk
      POSTGRES_PASSWORD: skytalk
      POSTGRES_DB: skytalk
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skytalk"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://skytalk:skytalk@db:5432/skytalk
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
